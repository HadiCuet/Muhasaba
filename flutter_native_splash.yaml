# Native splash configuration consumed by `dart run flutter_native_splash:create`.
# Only covers the brief flash before the Flutter SplashScreen widget mounts.
# The full Variant C design (gradient, glow, bilingual text) lives in
# lib/features/splash/splash_screen.dart.

flutter_native_splash:
  color: "#1F5740"
  color_dark: "#0E2B20"
  image: assets/icon/app_icon.png
  image_dark: assets/icon/app_icon.png

  # Android 12+ uses a different splash API — configure it explicitly so the
  # icon doesn't get clipped by the system's circular mask.
  android_12:
    color: "#1F5740"
    color_dark: "#0E2B20"
    image: assets/icon/app_icon.png
    image_dark: assets/icon/app_icon.png
    icon_background_color: "#1F5740"
    icon_background_color_dark: "#0E2B20"

  android: true
  ios: true
  web: false
  fullscreen: false
