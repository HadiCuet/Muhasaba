# Native splash configuration consumed by `dart run flutter_native_splash:create`.
# Only covers the brief flash before the Flutter SplashScreen widget mounts.
#
# White (light) / black (dark) — neutral, unbranded. The animated Variant C
# splash takes over as soon as Flutter boots and brings the gradient + icon
# in via animation.
#
# No icon: the icon is drawn only by the Flutter SplashScreen widget.

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"

  android_12:
    color: "#FFFFFF"
    color_dark: "#000000"

  android: true
  ios: true
  web: false
  fullscreen: false
