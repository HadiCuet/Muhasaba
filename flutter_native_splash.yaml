# Native splash configuration consumed by `dart run flutter_native_splash:create`.
# Only covers the brief flash before the Flutter SplashScreen widget mounts.
#
# Intentionally NO image: the native splash is a solid green field that matches
# the top of the Flutter splash's gradient. The icon is drawn only by the
# Flutter SplashScreen widget, with a fade + scale entrance animation. This
# avoids a static icon flashing on screen before the animated one appears.

flutter_native_splash:
  color: "#1F5740"
  color_dark: "#0E2B20"

  android_12:
    color: "#1F5740"
    color_dark: "#0E2B20"

  android: true
  ios: true
  web: false
  fullscreen: false
